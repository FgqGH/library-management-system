name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  AR_REPO: ${{ vars.AR_REPO }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  DB_HOST: ${{ vars.DB_HOST }}
  DB_PORT: ${{ vars.DB_PORT }}
  DB_NAME: ${{ vars.DB_NAME }}
  DB_USERNAME: ${{ secrets.DB_USERNAME }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
      - name: Run tests
        run: mvn test -q
      - name: Build package
        run: mvn package -DskipTests -q

  deploy-backend:
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev
      - id: Build and Push
        run: |
          cd backend && mvn package -DskipTests -q
          docker build -t asia-east1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/lms-backend:${{ github.sha }} .
          docker push asia-east1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/lms-backend:${{ github.sha }}
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy lms-backend \
            --image=asia-east1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/lms-backend:${{ github.sha }} \
            --region=asia-east1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=1 \
            --memory=512Mi \
            --set-env-vars="DB_HOST=${{ env.DB_HOST }},DB_PORT=${{ env.DB_PORT }},DB_NAME=${{ env.DB_NAME }},DB_USERNAME=${{ env.DB_USERNAME }},DB_PASSWORD=${{ env.DB_PASSWORD }},JWT_SECRET=${{ env.JWT_SECRET }}"
